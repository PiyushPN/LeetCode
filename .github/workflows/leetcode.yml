name: Update LeetCode Stats
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: LeetCode Stats
        uses: joshcai/leetcode-stats-action@v2
        with:
          username: PiyushPN
